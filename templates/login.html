<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cardiac Segmentation QC Studio — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-0:        #070a0d;
            --bg-1:        #0c1116;
            --bg-2:        #10161c;
            --bg-3:        #171f27;
            --line:        #1c242c;
            --line-mid:    #273340;
            --line-strong: #3a4a5a;
            --text-0:      #d6dee6;
            --text-1:      #8a96a3;
            --text-2:      #566370;
            --accent:      #5fb3d4;
            --accent-hi:   #8ad0ec;
            --accent-dim:  #26566c;
            --accent-bg:   rgba(95, 179, 212, 0.08);
            --err:         #d7504a;
            --font-mono:   'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg-0);
            color: var(--text-0);
            font-family: var(--font-mono);
            font-size: 12px;
            letter-spacing: 0.01em;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            position: relative;
            overflow: hidden;
        }

        #voxel-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            display: block;
        }

        /* HUD marker in the top-left corner of the viewport */
        .viewport-tag {
            position: fixed;
            top: 20px;
            left: 24px;
            font-size: 10px;
            color: var(--text-2);
            letter-spacing: 0.24em;
            text-transform: uppercase;
            z-index: 2;
        }
        .viewport-tag b {
            color: var(--accent);
            font-weight: 500;
        }

        .viewport-tag-right {
            position: fixed;
            top: 20px;
            right: 24px;
            font-size: 10px;
            color: var(--text-2);
            letter-spacing: 0.24em;
            text-transform: uppercase;
            z-index: 2;
        }

        .login-box {
            position: relative;
            z-index: 2;
            background: var(--bg-2);
            border: 1px solid var(--line-strong);
            padding: 36px 34px 30px;
            width: 340px;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.4);
        }

        /* Corner brackets on the login box (HUD feel) */
        .login-box::before,
        .login-box::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            border: 0 solid var(--accent);
            pointer-events: none;
        }
        .login-box::before {
            top: -1px;
            left: -1px;
            border-top-width: 1px;
            border-left-width: 1px;
        }
        .login-box::after {
            bottom: -1px;
            right: -1px;
            border-bottom-width: 1px;
            border-right-width: 1px;
        }

        .login-box img.logo {
            display: block;
            width: 120px;
            margin: 0 auto 18px;
            opacity: 0.85;
            transition: opacity 0.15s linear;
        }
        .login-box img.logo:hover { opacity: 1; }

        .login-box h2 {
            margin: 0 0 4px;
            color: var(--text-0);
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.28em;
            text-align: center;
        }
        .login-box h2::before {
            content: '▸ ';
            color: var(--accent);
            letter-spacing: 0;
        }

        .login-box .subtitle {
            text-align: center;
            font-size: 9.5px;
            color: var(--text-2);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin: 0 0 22px;
        }

        .field-label {
            display: block;
            font-size: 9.5px;
            font-weight: 500;
            color: var(--text-2);
            text-transform: uppercase;
            letter-spacing: 0.22em;
            margin: 10px 0 5px;
        }

        .login-box input[type="text"],
        .login-box input[type="password"] {
            width: 100%;
            padding: 9px 11px;
            border: 1px solid var(--line-mid);
            background: var(--bg-1);
            color: var(--text-0);
            font-family: var(--font-mono);
            font-size: 12px;
            letter-spacing: 0.04em;
            transition: border-color 0.12s linear, background 0.12s linear;
        }
        .login-box input[type="text"]:focus,
        .login-box input[type="password"]:focus {
            outline: none;
            border-color: var(--accent);
            background: var(--bg-3);
        }

        .login-box button {
            width: 100%;
            margin-top: 22px;
            padding: 11px;
            border: 1px solid var(--accent-dim);
            background: var(--bg-1);
            color: var(--accent-hi);
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.12s linear, border-color 0.12s linear, color 0.12s linear;
        }
        .login-box button:hover {
            background: var(--accent-bg);
            border-color: var(--accent);
            color: var(--accent-hi);
        }
        .login-box button:active {
            background: var(--bg-3);
        }

        .error {
            color: var(--err);
            background: var(--bg-1);
            border: 1px solid var(--err);
            border-left: 2px solid var(--err);
            padding: 7px 10px;
            margin-bottom: 14px;
            font-size: 10px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <canvas id="voxel-bg"></canvas>
    <div class="viewport-tag">◈ Cardiac <b>Segmentation</b> QC Studio</div>
    <div class="viewport-tag-right">auth</div>

    <div class="login-box">
        <img class="logo" src="https://images.squarespace-cdn.com/content/v1/611bce9f0ec5ff43949b98ea/068036ac-5a6f-4da8-869f-520764bdaaaa/still_v023_frame_0103_photoshop_layer_logo_LMS.png?format=300w" alt="Lab Logo">
        <h2>Sign In</h2>
        <p class="subtitle">Authentication Required</p>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="POST">
            <label class="field-label" for="username-input">Username</label>
            <input id="username-input" type="text" name="username" autofocus required autocomplete="username">
            <label class="field-label" for="password-input">Password</label>
            <input id="password-input" type="password" name="password" required autocomplete="current-password">
            <button type="submit">Enter</button>
        </form>
    </div>

    <script>
    (function () {
        const canvas = document.getElementById('voxel-bg');
        if (!canvas || !canvas.getContext) return;
        const ctx = canvas.getContext('2d');
        let W = 0, H = 0, dpr = 1;

        function resize() {
            dpr = window.devicePixelRatio || 1;
            W = window.innerWidth;
            H = window.innerHeight;
            canvas.width = Math.floor(W * dpr);
            canvas.height = Math.floor(H * dpr);
            canvas.style.width = W + 'px';
            canvas.style.height = H + 'px';
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        resize();
        window.addEventListener('resize', resize);

        // Particle count scales with screen area so density stays consistent
        const density = 0.00009;
        const N = Math.min(140, Math.max(50, Math.round(W * H * density)));
        const LINK_DIST  = 130;
        const LINK_DIST2 = LINK_DIST * LINK_DIST;
        const MOUSE_DIST  = 200;
        const MOUSE_DIST2 = MOUSE_DIST * MOUSE_DIST;
        const MAX_SPEED  = 1.4;

        const particles = [];
        for (let i = 0; i < N; i++) {
            particles.push({
                x: Math.random() * W,
                y: Math.random() * H,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5,
                r: 0.5 + Math.random() * 0.7,
            });
        }

        let mouseX = -9999, mouseY = -9999, mouseActive = false;
        function setMouse(x, y) { mouseX = x; mouseY = y; mouseActive = true; }
        window.addEventListener('mousemove', (e) => setMouse(e.clientX, e.clientY));
        window.addEventListener('mouseout', (e) => { if (!e.relatedTarget) mouseActive = false; });
        window.addEventListener('blur',     () => { mouseActive = false; });
        window.addEventListener('touchmove', (e) => {
            if (e.touches.length) setMouse(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: true });
        window.addEventListener('touchend', () => { mouseActive = false; });

        const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        function step() {
            // Update positions
            for (let i = 0; i < N; i++) {
                const p = particles[i];

                if (mouseActive) {
                    const dx = mouseX - p.x, dy = mouseY - p.y;
                    const d2 = dx*dx + dy*dy;
                    if (d2 < MOUSE_DIST2 && d2 > 1) {
                        const d = Math.sqrt(d2);
                        // Gentle pull toward cursor, stronger when closer
                        const f = (1 - d / MOUSE_DIST) * 0.06;
                        p.vx += (dx / d) * f;
                        p.vy += (dy / d) * f;
                    }
                }

                // Mild damping so they don't accelerate forever
                p.vx *= 0.992;
                p.vy *= 0.992;
                // Clamp speed
                const sp2 = p.vx*p.vx + p.vy*p.vy;
                if (sp2 > MAX_SPEED * MAX_SPEED) {
                    const sp = Math.sqrt(sp2);
                    p.vx = (p.vx / sp) * MAX_SPEED;
                    p.vy = (p.vy / sp) * MAX_SPEED;
                }
                // Maintain a minimum drift so the field stays alive when idle
                const minSp = 0.18;
                if (sp2 < minSp * minSp) {
                    const sp = Math.sqrt(sp2) || 0.0001;
                    p.vx = (p.vx / sp) * minSp;
                    p.vy = (p.vy / sp) * minSp;
                }

                p.x += p.vx;
                p.y += p.vy;

                // Wrap edges
                if (p.x < -10)      p.x = W + 10;
                else if (p.x > W + 10) p.x = -10;
                if (p.y < -10)      p.y = H + 10;
                else if (p.y > H + 10) p.y = -10;
            }

            ctx.clearRect(0, 0, W, H);

            // Pair lines
            ctx.lineWidth = 0.6;
            for (let i = 0; i < N; i++) {
                const a = particles[i];
                for (let j = i + 1; j < N; j++) {
                    const b = particles[j];
                    const dx = a.x - b.x, dy = a.y - b.y;
                    const d2 = dx*dx + dy*dy;
                    if (d2 < LINK_DIST2) {
                        const alpha = (1 - Math.sqrt(d2) / LINK_DIST) * 0.32;
                        ctx.strokeStyle = 'rgba(95, 179, 212, ' + alpha.toFixed(3) + ')';
                        ctx.beginPath();
                        ctx.moveTo(a.x, a.y);
                        ctx.lineTo(b.x, b.y);
                        ctx.stroke();
                    }
                }
            }

            // Mouse → particle lines (brighter)
            if (mouseActive) {
                ctx.lineWidth = 0.9;
                for (let i = 0; i < N; i++) {
                    const p = particles[i];
                    const dx = mouseX - p.x, dy = mouseY - p.y;
                    const d2 = dx*dx + dy*dy;
                    if (d2 < MOUSE_DIST2) {
                        const alpha = (1 - Math.sqrt(d2) / MOUSE_DIST) * 0.6;
                        ctx.strokeStyle = 'rgba(138, 208, 236, ' + alpha.toFixed(3) + ')';
                        ctx.beginPath();
                        ctx.moveTo(mouseX, mouseY);
                        ctx.lineTo(p.x, p.y);
                        ctx.stroke();
                    }
                }
            }

            // Particles on top
            ctx.fillStyle = 'rgba(160, 215, 240, 0.45)';
            for (let i = 0; i < N; i++) {
                const p = particles[i];
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fill();
            }

            if (!reduced) requestAnimationFrame(step);
        }

        requestAnimationFrame(step);
    })();
    </script>
</body>
</html>
